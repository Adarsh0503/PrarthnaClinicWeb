spring.application.name=prarthna-clinic

# ── Server ──
server.port=${PORT:8081}

# ── Database (Supabase PostgreSQL) ──
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:prarthnadb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=DAY,VALUE,TIME}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}

# ── JPA ──
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=true
# spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}

# ── H2 Console (only works locally) ──
# spring.h2.console.enabled=true
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

# ── JWT ──
jwt.secret=${JWT_SECRET:pRaRtHnAcLiNiC$ecR3tK3y!2024@F@r1d@b@d$D3lHi#S3cur3K3y}
jwt.expiration=86400000

# ── File Upload ──
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── CORS ──
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}

# ── Mail ──
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

# ── Logging ──
logging.level.com.prarthna=${LOG_LEVEL:DEBUG}
logging.level.org.springframework.security=WARN
logging.level.org.springframework=DEBUG