spring.application.name=prarthna-clinic

# ── Server ──
server.port=${PORT:8081}



spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# ── H2 Console (only works locally) ──
# spring.h2.console.enabled=true
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

# ── JWT ──
jwt.secret=${JWT_SECRET:pRaRtHnAcLiNiC$ecR3tK3y!2024@F@r1d@b@d$D3lHi#S3cur3K3y}
jwt.expiration=86400000

# ── File Upload ──
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── CORS ──
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://prarthna-clinic-web.vercel.app}

# ── Mail ──
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

# ── Logging ──
logging.level.com.prarthna=${LOG_LEVEL:DEBUG}
logging.level.org.springframework.security=WARN
logging.level.org.springframework=INFO